name: AQI Automated Pipeline

on:
  schedule:
    # Run every hour at :25
    - cron: '25 * * * *'
  workflow_dispatch:

jobs:
  aqi_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Data (crawler.py)
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/crawler.py

      - name: Generate Forecast (predict.py)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/predict.py

      - name: Commit & Push data and forecast if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          files_changed=0
          git add data/hourly_aqi.csv data/forecast.csv || true

          if ! git diff --staged --quiet; then
            git commit -m "Automated AQI data & forecast update $(date) [skip ci]"
            files_changed=1
          fi

          if [ "$files_changed" -eq 1 ]; then
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main
              if git push origin HEAD:main; then
                echo "Push succeeded on attempt ${attempt}."
                break
              fi
              if [ "${attempt}" -eq 3 ]; then
                echo "ERROR: push failed after 3 attempts."
                exit 1
              fi
              echo "Push failed on attempt ${attempt}, retrying in 5s..."
              sleep 5
            done
          else
            echo "No data or forecast changes, skip commit."
          fi
