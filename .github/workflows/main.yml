name: HourlyData Update

on:
  schedule:
    # 修改這裡：每小時的第21分鐘執行一次
    - cron: '21 * * * *'
  workflow_dispatch: 

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保有權限推送到 data 資料夾
      
    steps:
      # 升級到 v4 以上以支援 Node.js 24
      - name: Checkout code
        uses: actions/checkout@v4

      # 升級到 v5 以上以支援 Node.js 24
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Crawler
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python crawler.py

      - name: Commit and Push if data changed
        # 明確傳遞內建的 GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 這是 GitHub 內建的，不用手動設 Secret
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 檢查檔案是否存在
          if [ ! -f data/hourly_aqi.csv ]; then
            echo "ERROR: data/hourly_aqi.csv was not generated!"
            exit 1
          fi
          if [ ! -f data/daily_aqi.csv ]; then
            echo "ERROR: data/daily_aqi.csv was not generated!"
            exit 1
          fi

          git add data/*.csv
          
          # 檢查是否有變動，有的話才提交
          if [ -n "$(git status --porcelain)" ]; then
            # 在 Commit 訊息加上 [skip ci] 防止無窮迴圈
            git commit -m "Automated hourly data update $(date) [skip ci]"
            # 強制推送到 main 分支
            git push origin main
          else
            echo "No changes in data, skip commit."
          fi
