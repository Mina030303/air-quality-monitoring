name: Data Update

on:
  schedule:
    # Hourly update
    - cron: '21 * * * *'
    # Daily update (00:25 Asia/Taipei = 16:25 UTC)
    - cron: '25 16 * * *'
  workflow_dispatch: 

jobs:
  hourly_job:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '21 * * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python src/crawler.py

      - name: Commit hourly data if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [ ! -f data/hourly_aqi.csv ]; then
            echo "ERROR: data/hourly_aqi.csv was not generated!"
            exit 1
          fi

          git add data/hourly_aqi.csv

          if git diff --staged --quiet; then
            echo "No hourly data changes, skip commit."
          else
            git commit -m "Automated hourly data update $(date) [skip ci]"
            git push origin main
          fi

  daily_job:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '25 16 * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python src/crawler.py

      - name: Commit daily data if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [ ! -f data/daily_aqi.csv ]; then
            echo "ERROR: data/daily_aqi.csv was not generated!"
            exit 1
          fi

          git add data/daily_aqi.csv

          if git diff --staged --quiet; then
            echo "No daily data changes, skip commit."
          else
            git commit -m "Automated daily data update $(date) [skip ci]"
            git push origin main
          fi
