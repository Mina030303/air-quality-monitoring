name: Hourly Data Update

on:
  schedule:
    # 每天凌晨 02:05 執行 (台北時間 UTC+8)
    - cron: '5 18 * * *'
  workflow_dispatch: 

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 💡 確保有權限推送到 data 資料夾
      
    steps:
      # 升級到 v4 以上以支援 Node.js 24
      - name: Checkout code
        uses: actions/checkout@v4

      # 升級到 v5 以上以支援 Node.js 24
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Crawler
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python crawler.py

      - name: Commit and Push if data changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [ ! -f data/hourly_aqi.csv ]; then
            echo "ERROR: data/hourly_aqi.csv was not generated by crawler.py"
            exit 1
          fi

          git add data/hourly_aqi.csv
          
          # 檢查是否有變動，有的話才提交
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update hourly data $(date)"
            git push
          else
            echo "No changes to commit"
          fi
